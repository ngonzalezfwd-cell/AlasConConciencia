<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlasConCiencia | Iniciar Sesión</title>
    <link rel="stylesheet" href="../styles/login-registro.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="contenedor-login">

        <h2>Iniciar Sesión</h2>

        <section id="form-login">

            <div class="formGrupo">

                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="Ejemplo@email.com">
            </div>

            <div class="formGrupo">

                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>

            <button type="submit" class="btnLogin" id="btnLogin">Entrar</button>

        </section>

        <p class="enlace-switch">¿No tienes cuenta? <a href="/registro">Regístrate</a></p>
        <p class="enlace-switch"><a href="/">Volver al inicio</a></p>
    </div>

    <script type="module" src="../js/login.js"></script>
</body>

</html>
