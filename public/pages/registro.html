<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlasConCiencia | Registro</title>
    <link rel="stylesheet" href="../styles/login-registro.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="contenedor-registro">

        <h2>Únete a nosotros</h2>

        <section class="formRegistro">

            <!--DATOS PERSONALES-->
            <div id="DatosPersonales">

                <h3>Datos Personales</h3>

                <div class="formGrupo">

                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Tu nombre" required>
                </div>

                <div class="formGrupo">

                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" placeholder="Tu apellido" required>
                </div>


                <!--EDAD Y GENERO-->
                <div class="Password">

                    <div class="formGrupo">

                        <label for="edad">Edad</label>
                        <input type="number" id="edad" placeholder="Tu edad" required>
                    </div>

                    <div class="formGrupo">

                        <label for="genero">Genero</label>
                        <select name="genero" id="genero" required>
                            <option value="Femenino">Femenino</option>
                            <option value="Masculino">Masculino</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>

                </div>

                <div class="formGrupo">

                    <label for="pais">Pais</label>
                    <input type="text" id="pais" placeholder="Tu pais" required>
                </div>

            </div>



            <!--DATOS DE CONTACTO-->
            <div id="DatosContacto">

                <h3>Datos de Contacto</h3>

                <div class="formGrupo">

                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="formGrupo">

                    <label for="telefono">Telefono</label>
                    <input type="tel" id="telefono" placeholder="Tu telefono" required>
                </div>


                <div class="Password">

                    <div class="formGrupo">

                        <label for="password">Contraseña</label>
                        <input type="password" id="password" placeholder="Mínimo 8 caracteres" required>
                    </div>

                    <div class="formGrupo">

                        <label for="confirmarPassword">Confirmar Contraseña</label>
                        <input type="password" id="confirmarPassword" placeholder="Mínimo 8 caracteres" required>
                    </div>

                </div>

                <button type="submit" id="btnRegistro">Crear Cuenta</button>

            </div>

        </section>

        <p class="enlace-switch">¿Ya tienes cuenta? <a href="/login">Inicia sesión</a></p>

    </div>

    <script type="module" src="../js/registro.js"></script>
</body>

</html>
